<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AM Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .error-msg {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.35);
      color: #f87171;
      font-size: 13px;
      padding: 9px 13px;
      border-radius: 7px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">FX</div>
      <span>ForexCRM Pro</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your Account Manager portal</p>

    <div id="loginError" class="error-msg"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          placeholder="you@company.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </p>
  </div>

  <script src="app.js"></script>
  <script>initLogin();</script>
</body>
</html>
